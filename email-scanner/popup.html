<!DOCTYPE html>
<html>
<head>
  <title>Email Safety Scanner</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .header {
      text-align: center;
      margin-bottom: 15px;
    }
    .status {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      text-align: center;
    }
    .scanning {
      background-color: #fff3cd;
      color: #856404;
    }
    .safe {
      background-color: #d4edda;
      color: #155724;
    }
    .warning {
      background-color: #f8d7da;
      color: #721c24;
    }
    .scan-button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .scan-button:hover {
      background-color: #0056b3;
    }
    .scan-button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Email Safety Scanner</h2>
  </div>
  <div id="statusBox" class="status scanning">
    Click the button below to scan the email
  </div>
  <button id="scanButton" class="scan-button">Scan Email Content</button>
  <script src="popup.js"></script>
</body>
</html>
